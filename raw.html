<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#f5f0e8;--muted:rgba(245,240,232,0.42);--faint:rgba(245,240,232,0.12);
      --border:rgba(245,240,232,0.17);--accent:#e8b4b8;
      --acc-faint:rgba(232,180,184,0.13);--acc-border:rgba(232,180,184,0.46);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#03020a;overflow:hidden;font-family:'Inconsolata',monospace;color:var(--ink);user-select:none;cursor:default;}
    canvas{display:block;position:fixed;inset:0;z-index:1;}
    #grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.38;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");}
    #hud{position:fixed;inset:0;z-index:10;pointer-events:none;}
    #wordmark{position:absolute;top:2rem;left:2.4rem;opacity:0;animation:fadeUp 2s 0.8s ease forwards;}
    #wordmark h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(0.95rem,1.8vw,1.35rem);letter-spacing:0.25em;color:var(--ink);}
    #wordmark span{display:block;font-size:0.54rem;letter-spacing:0.4em;color:var(--muted);margin-top:0.28rem;text-transform:uppercase;}
    #counter{position:absolute;top:2.1rem;right:2.4rem;font-size:0.56rem;letter-spacing:0.28em;color:var(--muted);text-transform:uppercase;opacity:0;animation:fadeUp 2s 1.1s ease forwards;}
    #lyrics-wrap{position:absolute;bottom:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding-bottom:clamp(7rem,15vh,10rem);pointer-events:none;}
    #lyric-prev{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(0.78rem,1.35vw,1rem);color:rgba(245,240,232,0.16);letter-spacing:0.1em;margin-bottom:0.6rem;text-align:center;padding:0 3rem;}
    #lyric-current{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(1.4rem,3.5vw,2.5rem);color:var(--ink);letter-spacing:0.05em;text-align:center;padding:0 2.5rem;line-height:1.35;text-shadow:0 2px 60px rgba(232,180,184,0.28),0 0 120px rgba(232,180,184,0.1);}
    #lyric-current.flash{animation:lyricIn 0.65s cubic-bezier(0.22,1,0.36,1);}
    #lyric-current.vn-active{color:var(--accent);}
    #lyric-next{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(0.78rem,1.35vw,1rem);color:rgba(245,240,232,0.16);letter-spacing:0.1em;margin-top:0.6rem;text-align:center;padding:0 3rem;}
    #lyric-bar{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin-top:0.85rem;opacity:0;transition:width 1.3s cubic-bezier(0.22,1,0.36,1),opacity 0.9s ease;}
    #lyric-bar.active{width:3.2rem;opacity:1;}
    #vn-indicator{position:absolute;bottom:calc(100% + 0.7rem);left:50%;transform:translateX(-50%) translateY(6px);font-size:0.5rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--accent);opacity:0;transition:opacity 0.5s ease,transform 0.5s ease;display:flex;align-items:center;gap:0.4rem;white-space:nowrap;}
    #vn-indicator.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #vn-indicator .vn-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite ease-in-out;}
    #controls{position:absolute;bottom:2.2rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:0.75rem;pointer-events:all;white-space:nowrap;opacity:0;animation:fadeUp 2s 1.4s ease forwards;}
    .btn{background:var(--faint);border:1px solid var(--border);color:var(--ink);font-family:'Inconsolata',monospace;font-size:clamp(0.5rem,0.85vw,0.62rem);letter-spacing:0.2em;text-transform:uppercase;padding:0.55rem 1.3rem;border-radius:50px;cursor:pointer;transition:background 0.3s,border-color 0.3s,transform 0.15s;backdrop-filter:blur(16px);}
    .btn:hover{background:rgba(245,240,232,0.1);border-color:rgba(245,240,232,0.38);transform:scale(1.05);}
    .btn:active{transform:scale(0.96);}
    #music-btn{display:flex;align-items:center;gap:0.5rem;background:var(--acc-faint);border-color:var(--acc-border);color:var(--accent);}
    #music-btn:hover{background:rgba(232,180,184,0.22);}
    #music-btn .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.7s infinite ease-in-out;}
    #music-btn.paused .dot{animation:none;opacity:0.35;}
    #progress-wrap{position:fixed;bottom:0;left:0;right:0;height:1.5px;background:rgba(245,240,232,0.05);z-index:15;pointer-events:none;}
    #progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),rgba(232,180,184,0.28));width:0%;transition:width 0.28s linear;}
    #time-display{position:fixed;bottom:1.5rem;right:2.4rem;font-size:0.54rem;letter-spacing:0.25em;color:var(--muted);pointer-events:none;z-index:15;opacity:0;animation:fadeUp 2s 1.6s ease forwards;}
    #splash{position:fixed;inset:0;z-index:50;background:#03020a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transition:opacity 1.4s ease;}
    #splash.out{opacity:0;pointer-events:none;}
    #splash-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(2.4rem,7vw,4.5rem);letter-spacing:0.12em;color:var(--ink);text-align:center;animation:fadeUp 2s 0.3s ease both;}
    #splash-sub{font-size:0.58rem;letter-spacing:0.4em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:2;animation:fadeUp 2s 0.7s ease both;}
    #splash-heart{font-size:1.6rem;color:var(--accent);animation:fadeUp 2s 1s ease both,heartbeat 2.6s 2s infinite ease-in-out;line-height:1;}
    #start-btn{background:var(--acc-faint);border:1px solid var(--acc-border);color:var(--accent);font-family:'Inconsolata',monospace;font-size:0.66rem;letter-spacing:0.32em;text-transform:uppercase;padding:0.85rem 3rem;border-radius:50px;cursor:pointer;transition:all 0.3s;animation:fadeUp 2s 1.3s ease both;}
    #start-btn:hover{background:rgba(232,180,184,0.26);transform:scale(1.05);}
    #start-btn:active{transform:scale(0.97);}
    .rule{width:2.5rem;height:1px;background:linear-gradient(90deg,transparent,var(--acc-border),transparent);animation:fadeUp 2s 1.1s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes lyricIn{0%{opacity:0;transform:translateY(12px) scale(0.97)}55%{opacity:1;transform:translateY(-3px) scale(1.01)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(0.5);opacity:0.3}}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.2)}28%{transform:scale(1)}42%{transform:scale(1.13)}56%{transform:scale(1)}}
    @media(max-width:640px){#wordmark{top:1.2rem;left:1.4rem}#counter{top:1.3rem;right:1.4rem}#controls{gap:0.5rem;flex-wrap:wrap;justify-content:center}.btn{padding:0.45rem 0.9rem}}
  </style>
</head>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PHOTOS    = JSON.parse(document.getElementById('photo-data').textContent);
const LYRICS    = JSON.parse(document.getElementById('lyrics-data').textContent);
const AUDIO_SRC = JSON.parse(document.getElementById('audio-src').textContent);
const VN_FILES  = JSON.parse(document.getElementById('voicenote-src').textContent);
const IS_MOB    = window.innerWidth < 768;

// Total sphere positions = exactly PHOTOS.length so every photo appears once
const SPHERE_COUNT = PHOTOS.length; // 62

document.getElementById('counter').textContent = `${PHOTOS.length} photographs · memory planet`;

// ── VOICE-NOTE TIMELINE (fixed, explicit start/duration per clip) ──
// This is the single source of truth for when each voice note plays.
// No derivation from lyrics — exact timestamps as specified, nothing more.
const VN_TIMELINE=[
  {label:'kuchNahi', start:20,  duration:8},
  {label:'new2',     start:63,  duration:14},
  {label:'new3',     start:124, duration:18},
  {label:'gaali',    start:150, duration:31},
];
const VN_SEGMENTS=VN_TIMELINE.map(v=>({
  label:v.label, start:v.start, end:v.start+v.duration, file:VN_FILES[v.label]
}));

// ── LYRICS ──────────────────────────────────────
const elPrev=document.getElementById('lyric-prev'),elCur=document.getElementById('lyric-current'),
      elNext=document.getElementById('lyric-next'),elBar=document.getElementById('lyric-bar'),
      elVN=document.getElementById('vn-indicator');
let lyricIdx=-1;
function syncLyrics(t){
  let idx=-1;
  for(let i=0;i<LYRICS.length;i++){if(t>=LYRICS[i].t)idx=i;else break;}
  if(idx===lyricIdx)return; lyricIdx=idx;
  const line = idx>=0 ? LYRICS[idx].line : '♡';
  // Skip rendering raw "Voice-Notes..." markers as lyric text — the VN indicator handles that.
  if(typeof line==='string' && line.startsWith('Voice-Notes')) return;
  elPrev.textContent=idx>0?LYRICS[idx-1].line:'';
  elNext.textContent=idx<LYRICS.length-1?LYRICS[idx+1].line:'';
  elCur.classList.remove('flash');void elCur.offsetWidth;
  elCur.textContent=line;
  elCur.classList.add('flash');elBar.classList.add('active');
}

// ── AUDIO (main track loops on end) ──────────────
const audio=new Audio(AUDIO_SRC);
audio.preload='auto';
audio.loop=true;

// ── VOICE NOTE AUDIO + DUCKING ────────────────────────────────────────
// Each clip gets its own preloaded <audio> element (no src-swapping mid-playback,
// which is what caused the old glitches/pops when clips changed back to back).
const vnAudioMap={};
Object.entries(VN_FILES).forEach(([label,file])=>{
  const a=new Audio(file);
  a.preload='auto';
  a.volume=0;
  vnAudioMap[label]=a;
});

const MAIN_VOL_NORMAL=1;
const MAIN_VOL_DUCKED=0.16;
const FADE_MS=450;      // duck / restore fade for the background track
const VN_FADE_MS=250;   // fade in/out for the voice note clip itself
let activeVN=null;      // currently playing segment object, or null
let lastCT=0;

// requestAnimationFrame-based volume fade — smoother and glitch-free compared to
// setInterval, since it rides the browser's paint clock instead of a fixed timer.
function fadeVolume(el,target,duration=FADE_MS){
  if(el._fadeRAF) cancelAnimationFrame(el._fadeRAF);
  const start=el.volume;
  const t0=performance.now();
  function step(now){
    const p=Math.min(1,(now-t0)/duration);
    el.volume=Math.max(0,Math.min(1,start+(target-start)*p));
    if(p<1){ el._fadeRAF=requestAnimationFrame(step); }
    else{ el._fadeRAF=null; }
  }
  el._fadeRAF=requestAnimationFrame(step);
}

function startVN(seg){
  activeVN=seg;
  fadeVolume(audio,MAIN_VOL_DUCKED,FADE_MS);

  const vn=vnAudioMap[seg.label];
  // Make sure no other voice note clip is left playing underneath.
  Object.entries(vnAudioMap).forEach(([label,a])=>{
    if(label!==seg.label && !a.paused){ a.pause(); a.currentTime=0; a.volume=0; }
  });
  vn.currentTime=0;
  vn.volume=0;
  vn.play().catch(()=>{});
  fadeVolume(vn,1,VN_FADE_MS);

  elVN.classList.add('show');
  elCur.classList.add('vn-active');
}

function stopVN(){
  const seg=activeVN;
  activeVN=null;
  fadeVolume(audio,MAIN_VOL_NORMAL,FADE_MS);
  if(seg){
    const vn=vnAudioMap[seg.label];
    fadeVolume(vn,0,VN_FADE_MS);
    setTimeout(()=>{ if(vn.volume<0.01){ vn.pause(); } },VN_FADE_MS+60);
  }
  elVN.classList.remove('show');
  elCur.classList.remove('vn-active');
}

function resetAllVN(){
  Object.values(vnAudioMap).forEach(a=>{
    if(a._fadeRAF) cancelAnimationFrame(a._fadeRAF);
    a.pause(); a.currentTime=0; a.volume=0;
  });
  if(audio._fadeRAF) cancelAnimationFrame(audio._fadeRAF);
  audio.volume=MAIN_VOL_NORMAL;
  activeVN=null;
  elVN.classList.remove('show');
  elCur.classList.remove('vn-active');
}

function handleVoiceNotes(ct){
  // Main track looped back to 0 — hard-reset any in-flight voice note state
  // so nothing bleeds across the loop boundary.
  if(ct<lastCT-0.5){ resetAllVN(); }
  lastCT=ct;

  const seg=VN_SEGMENTS.find(s=>ct>=s.start&&ct<s.end);

  if(seg && (!activeVN || activeVN.label!==seg.label)){
    startVN(seg);
  }else if(!seg && activeVN){
    stopVN();
  }
}

const progBar=document.getElementById('progress-bar'),timeEl=document.getElementById('time-display');
const musicBtn=document.getElementById('music-btn'),musicLabel=document.getElementById('music-label');
const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

audio.addEventListener('seeked',()=>{ if(audio.currentTime<1) lyricIdx=-1; });
audio.addEventListener('ended',()=>{ lyricIdx=-1; });

musicBtn.addEventListener('click',()=>{
  if(audio.paused){
    audio.play();
    if(activeVN) vnAudioMap[activeVN.label].play().catch(()=>{});
    musicBtn.classList.remove('paused');musicLabel.textContent='Playing';
  }else{
    audio.pause();
    if(activeVN) vnAudioMap[activeVN.label].pause();
    musicBtn.classList.add('paused');musicLabel.textContent='Paused';
  }
});

// ── SCENE GLOBALS ─────────────────────────────────
let scene,camera,renderer,controls,clock;
const meshes=[];
let busy=false,lastT=0,nextShoot=0;
const SHOOTERS=[];
const SHOOT_SEGS=40;

// ── STAR FIELD ────────────────────────────────────
function buildStars(){
  const N=3200,pos=new Float32Array(N*3),sz=new Float32Array(N),
        ph=new Float32Array(N),sp=new Float32Array(N),col=new Float32Array(N*3);
  const pal=[[1,1,1],[.88,.94,1],[.96,.96,1],[1,.97,.90],[.94,.90,1],[1,.88,.92]];
  const wt=[.38,.22,.18,.12,.06,.04];
  function pick(){let r=Math.random(),a=0;for(let p=0;p<wt.length;p++){a+=wt[p];if(r<a)return pal[p];}return pal[0];}
  for(let i=0;i<N;i++){
    const u=Math.random(),v=Math.random(),th=2*Math.PI*u,ph2=Math.acos(2*v-1);
    const rad=2400+Math.pow(Math.random(),.6)*6600;
    pos[i*3]=rad*Math.sin(ph2)*Math.cos(th);pos[i*3+1]=rad*Math.sin(ph2)*Math.sin(th);pos[i*3+2]=rad*Math.cos(ph2);
    const r2=Math.random();
    sz[i]=r2<.05?3.8+Math.random()*3.2:r2<.20?1.8+Math.random()*1.4:.6+Math.random()*.9;
    ph[i]=Math.random()*Math.PI*2;sp[i]=.18+Math.random()*.55;
    const c=pick();col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2];
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
  geo.setAttribute('aPhase',new THREE.BufferAttribute(ph,1));
  geo.setAttribute('aSpeed',new THREE.BufferAttribute(sp,1));
  geo.setAttribute('aColor',new THREE.BufferAttribute(col,3));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0},uDPR:{value:Math.min(devicePixelRatio,2)}},
    vertexShader:`
      attribute float aSize,aPhase,aSpeed;attribute vec3 aColor;
      uniform float uTime,uDPR;varying float vAlpha;varying vec3 vColor;
      void main(){
        float tw=0.52+0.48*sin(uTime*aSpeed+aPhase);
        float sh=0.90+0.10*sin(uTime*aSpeed*3.1+aPhase*1.7);
        vAlpha=tw*sh;vColor=aColor;
        vec4 mv=modelViewMatrix*vec4(position,1.);
        gl_PointSize=aSize*uDPR*(0.80+0.20*tw)*(900./-mv.z);
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      varying float vAlpha;varying vec3 vColor;
      void main(){
        vec2 uv=gl_PointCoord-.5;float d=length(uv);
        float core=1.-smoothstep(0.,.18,d);
        float ring=(1.-smoothstep(.17,.26,d))*.22;
        float halo=(1.-smoothstep(.22,.50,d))*.28;
        float alpha=(core+ring+halo)*vAlpha;
        if(alpha<.004)discard;
        vec3 c=mix(vColor,vec3(.92,.96,1.),core*.18);
        gl_FragColor=vec4(c,alpha);
      }`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  const pts=new THREE.Points(geo,mat);scene.add(pts);return pts;
}

// ── NEBULA ────────────────────────────────────────
function buildNebula(){
  const grp=new THREE.Group();
  function mkTex(r,g,b){
    const sz=256,c=document.createElement('canvas');c.width=c.height=sz;
    const ctx=c.getContext('2d');
    const grd=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
    grd.addColorStop(0,`rgba(${r},${g},${b},0.20)`);
    grd.addColorStop(.45,`rgba(${r},${g},${b},0.06)`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grd;ctx.fillRect(0,0,sz,sz);
    return new THREE.CanvasTexture(c);
  }
  [{r:120,g:80,b:200,s:3400,x:4000,y:1800,z:-2000},{r:80,g:140,b:220,s:2900,x:-3500,y:-1200,z:-3000},
   {r:200,g:90,b:130,s:2500,x:2000,y:-2800,z:1500},{r:60,g:180,b:160,s:2300,x:-2200,y:2200,z:2800},
   {r:160,g:80,b:200,s:3800,x:1000,y:3500,z:-4000},{r:220,g:140,b:80,s:1900,x:-4200,y:-500,z:1200}]
  .forEach(d=>{
    const mat=new THREE.MeshBasicMaterial({map:mkTex(d.r,d.g,d.b),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(d.s,d.s),mat);
    mesh.position.set(d.x,d.y,d.z);mesh.lookAt(0,0,0);grp.add(mesh);
  });
  scene.add(grp);return grp;
}

// ── PLANET GLOW ───────────────────────────────────
function buildGlow(radius){
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN;uniform float uTime;
      void main(){
        float rim=pow(1.-abs(dot(vN,vec3(0,0,1))),3.0);
        float t=sin(uTime*.12)*.5+.5;
        vec3 c=mix(vec3(.91,.55,.60),vec3(.55,.62,1.),t);
        gl_FragColor=vec4(c,rim*.25);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide});
  const m=new THREE.Mesh(new THREE.SphereGeometry(radius*1.20,64,64),mat);scene.add(m);return m;
}

// ── PLANET RING ───────────────────────────────────
function buildRing(inner,outer){
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec2 vUv;uniform float uTime;
      void main(){
        float edge=1.-abs(vUv.x*2.-1.);float glow=pow(edge,2.2);
        float sh=.78+.22*sin(vUv.y*12.566+uTime*.4);
        vec3 rose=vec3(.91,.60,.64),blue=vec3(.55,.70,1.);
        vec3 col=mix(rose,blue,.5+.5*sin(vUv.y*6.283+uTime*.18));
        gl_FragColor=vec4(col,glow*sh*.55);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide});
  const m=new THREE.Mesh(new THREE.RingGeometry(inner,outer,128,4),mat);
  m.rotation.x=Math.PI/2+.38;m.rotation.z=.22;scene.add(m);return m;
}

// ── DUST RING ─────────────────────────────────────
function buildDust(inner,outer,tilt){
  const N=1800,pos=new Float32Array(N*3),sz=new Float32Array(N),al=new Float32Array(N);
  for(let i=0;i<N;i++){
    const angle=(i/N)*Math.PI*2+(Math.random()-.5)*.04;
    const spread=inner+Math.random()*(outer-inner);
    const ty=(Math.random()-.5)*30;
    const ta=Math.PI/2+tilt,z0=spread*Math.sin(angle);
    pos[i*3]=spread*Math.cos(angle);
    pos[i*3+1]=ty*Math.cos(ta)-z0*Math.sin(ta);
    pos[i*3+2]=ty*Math.sin(ta)+z0*Math.cos(ta);
    sz[i]=.8+Math.random()*2.2;al[i]=.2+Math.random()*.6;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aSize',new THREE.BufferAttribute(sz,1));
  geo.setAttribute('aAlpha',new THREE.BufferAttribute(al,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`attribute float aSize,aAlpha;uniform float uTime;varying float vA;void main(){vA=aAlpha;vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(500./-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying float vA;void main(){float d=length(gl_PointCoord-.5);float a=(1.-smoothstep(0.,.5,d))*vA;if(a<.01)discard;gl_FragColor=vec4(.88,.82,1.,a*.4);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(geo,mat);scene.add(pts);return pts;
}

// ── SHOOTING STARS ────────────────────────────────
function buildShooterPool(){
  for(let i=0;i<8;i++){
    const segPts=new Float32Array((SHOOT_SEGS+1)*3);
    const segT=new Float32Array(SHOOT_SEGS+1);
    for(let s=0;s<=SHOOT_SEGS;s++)segT[s]=s/SHOOT_SEGS;
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(segPts,3));
    geo.setAttribute('aT',new THREE.BufferAttribute(segT,1));
    const mat=new THREE.ShaderMaterial({
      uniforms:{uAlpha:{value:0},uColor:{value:new THREE.Color(1,.98,.95)}},
      vertexShader:`attribute float aT;varying float vT;void main(){vT=aT;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`varying float vT;uniform float uAlpha;uniform vec3 uColor;void main(){float a=(1.-vT)*uAlpha;if(a<.005)discard;vec3 c=mix(uColor,vec3(1.,1.,1.),1.-vT);gl_FragColor=vec4(c,a);}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
    const line=new THREE.Line(geo,mat);line.frustumCulled=false;scene.add(line);
    SHOOTERS.push({line,geo,segPts,active:false,progress:0,speed:0,start:new THREE.Vector3(),end:new THREE.Vector3()});
  }
}
function spawnShooter(){
  const s=SHOOTERS.find(s=>!s.active);if(!s)return;
  const dist=3000+Math.random()*3500,ph=Math.random()*Math.PI,th=Math.random()*Math.PI*2;
  s.start.set(dist*Math.sin(ph)*Math.cos(th),dist*(.1+Math.random()*.7),dist*Math.sin(ph)*Math.sin(th));
  const dir=new THREE.Vector3((Math.random()-.5)*2,-.3-Math.random()*.5,(Math.random()-.5)*2).normalize();
  s.end.copy(s.start).addScaledVector(dir,900+Math.random()*1600);
  const roll=Math.random();
  s.line.material.uniforms.uColor.value.copy(roll<.15?new THREE.Color(1,.78,.84):roll<.30?new THREE.Color(.80,.90,1):new THREE.Color(1,.98,.95));
  s.speed=.7+Math.random()*.9;s.progress=0;s.active=true;
}
function updateShooters(dt){
  SHOOTERS.forEach(s=>{
    if(!s.active)return;
    s.progress+=dt*s.speed;
    if(s.progress>=1.4){s.active=false;s.line.material.uniforms.uAlpha.value=0;return;}
    const p=Math.min(s.progress,1.0);
    const tailLen=Math.min(p,.38);
    const tailStart=new THREE.Vector3().lerpVectors(s.start,s.end,Math.max(0,p-tailLen));
    const head=new THREE.Vector3().lerpVectors(s.start,s.end,p);
    const segs=s.segPts.length/3;
    for(let i=0;i<segs;i++){
      const t=i/(segs-1),pt=new THREE.Vector3().lerpVectors(tailStart,head,t);
      s.segPts[i*3]=pt.x;s.segPts[i*3+1]=pt.y;s.segPts[i*3+2]=pt.z;
    }
    s.geo.attributes.position.needsUpdate=true;
    s.line.material.uniforms.uAlpha.value=(s.progress<1.0?1.0:1.0-(s.progress-1.0)/.4)*.92;
  });
}

// ── FOCUS PHOTO — always a NEW one ───────────────
let lastFocusIdx = -1;
function getNextFocusIdx(){
  if(meshes.length===0) return 0;
  if(meshes.length===1) return 0;
  let idx;
  do { idx=Math.floor(Math.random()*meshes.length); } while(idx===lastFocusIdx);
  lastFocusIdx=idx;
  return idx;
}

// ── MAIN BUILD ────────────────────────────────────
let starPts,nebulaGrp,glowMesh,ringMesh,dustPts;

function buildScene(){
  clock=new THREE.Clock();
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x03020a,.000032);

  const W=window.innerWidth,H=window.innerHeight;
  camera=new THREE.PerspectiveCamera(IS_MOB?70:58,W/H,1,18000);
  camera.position.z=IS_MOB?2100:1550;

  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('three-canvas'),antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=.06;
  controls.autoRotate=true;controls.autoRotateSpeed=.28;
  controls.enablePan=false;controls.minDistance=250;controls.maxDistance=5500;

  nebulaGrp=buildNebula();
  starPts=buildStars();
  glowMesh=buildGlow(700);
  ringMesh=buildRing(820,1020);
  dustPts=buildDust(820,1020,.38);
  buildShooterPool();
  nextShoot=Date.now()+1200+Math.random()*1800;

  // ── PHOTO SPHERE ──────────────────────────────
  const planeGeo=new THREE.PlaneGeometry(100,148);
  const loader=new THREE.TextureLoader();
  const cache={};
  const uniq=[...new Set(PHOTOS)];
  let loaded=0;
  const goldenAngle=Math.PI*(3-Math.sqrt(5));

  function phTex(){
    const c=document.createElement('canvas');c.width=100;c.height=148;
    const ctx=c.getContext('2d');ctx.fillStyle='#110d18';ctx.fillRect(0,0,100,148);
    ctx.fillStyle='rgba(232,180,184,0.35)';ctx.font='32px serif';ctx.textAlign='center';ctx.fillText('♡',50,80);
    return new THREE.CanvasTexture(c);
  }

  function buildSphere(){
    for(let i=0;i<SPHERE_COUNT;i++){
      const url=PHOTOS[i];
      const tex=cache[url]||phTex();
      const tc=tex.clone();tc.needsUpdate=true;tc.colorSpace=THREE.SRGBColorSpace;
      const iw=tex.image?tex.image.width||1:1,ih=tex.image?tex.image.height||1:1;
      const ia=iw/ih,fa=100/148;
      if(ia>fa){const s=fa/ia;tc.repeat.set(s,1);tc.offset.set((1-s)/2,0);}
      else{const s=ia/fa;tc.repeat.set(1,s);tc.offset.set(0,(1-s)/2);}
      const mat=new THREE.MeshBasicMaterial({map:tc,side:THREE.DoubleSide,color:0xffffff});
      const mesh=new THREE.Mesh(planeGeo,mat);

      const y=1-(i/(SPHERE_COUNT-1))*2;
      const r=Math.sqrt(Math.max(0,1-y*y));
      const th=goldenAngle*i;
      mesh.position.set(700*r*Math.cos(th),700*y,700*r*Math.sin(th));
      mesh.lookAt(0,0,0);mesh.rotateY(Math.PI);
      scene.add(mesh);meshes.push(mesh);
    }
    lastT=clock.getElapsedTime();
    loop();
  }

  uniq.forEach(url=>{
    loader.load(url,
      tex=>{tex.colorSpace=THREE.SRGBColorSpace;cache[url]=tex;if(++loaded===uniq.length)buildSphere();},
      undefined,
      ()=>{cache[url]=phTex();if(++loaded===uniq.length)buildSphere();}
    );
  });
}

// ── RENDER LOOP ───────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,.05);lastT=t;
  controls.update();
  if(starPts)  starPts.material.uniforms.uTime.value=t;
  if(ringMesh) ringMesh.material.uniforms.uTime.value=t;
  if(glowMesh) glowMesh.material.uniforms.uTime.value=t;
  if(nebulaGrp){nebulaGrp.rotation.y=t*.006;nebulaGrp.rotation.x=Math.sin(t*.004)*.04;}
  const now=Date.now();
  if(now>=nextShoot){spawnShooter();nextShoot=now+3500+Math.random()*4500;}
  updateShooters(dt);
  renderer.render(scene,camera);
  if(!audio.paused&&audio.duration){
    const ct=audio.currentTime,dur=audio.duration;
    progBar.style.width=`${(ct/dur)*100}%`;
    timeEl.textContent=`${fmt(ct)} / ${fmt(dur)}`;
    syncLyrics(ct);
    handleVoiceNotes(ct);
  }
}

// ── EXPLORE (always new photo) ────────────────────
function explore(){
  if(busy||meshes.length===0)return;
  busy=true;controls.enabled=false;
  const idx=getNextFocusIdx();
  const tg=meshes[idx];
  const tp=new THREE.Vector3();tg.getWorldPosition(tp);
  const d=IS_MOB?520:360;
  const cp=tp.clone().normalize().multiplyScalar(700+d);
  gsap.to(camera.position,{duration:2.4,ease:'power3.inOut',x:cp.x,y:cp.y,z:cp.z});
  gsap.to(controls.target,{duration:2.4,ease:'power3.inOut',x:tp.x,y:tp.y,z:tp.z,
    onComplete:()=>{busy=false;controls.enabled=true;}});
}
function orbitView(){
  if(busy)return;busy=true;controls.enabled=false;
  gsap.to(camera.position,{duration:2.2,ease:'power3.inOut',x:0,y:0,z:IS_MOB?2100:1550});
  gsap.to(controls.target,{duration:2.2,ease:'power3.inOut',x:0,y:0,z:0,
    onComplete:()=>{busy=false;controls.enabled=true;}});
}
document.getElementById('explore-btn').addEventListener('click',explore);
document.getElementById('orbit-btn').addEventListener('click',orbitView);

// ── RESIZE ────────────────────────────────────────
window.addEventListener('resize',()=>{
  if(!renderer)return;
  const W=window.innerWidth,H=window.innerHeight;
  camera.aspect=W/H;camera.fov=W<768?70:58;camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  if(starPts)starPts.material.uniforms.uDPR.value=Math.min(devicePixelRatio,2);
});

// ── SPLASH ────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('splash').classList.add('out');
  setTimeout(()=>document.getElementById('splash')?.remove(),1500);
  buildScene();
  audio.play().catch(()=>{musicBtn.classList.add('paused');musicLabel.textContent='Tap to play';});
});

</script>
